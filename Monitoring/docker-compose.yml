# Java app + Prometheus + Grafana on a shared Docker network.
# Run: docker compose up --build

services:
  # Java metrics demo; exposes /metrics for Prometheus to scrape.
  app:
    build: ./app
    ports:
      - "8080:8080"   # app, /metrics, /work, /health
    networks:
      - monitoring

  # Pulls metrics from app:8080/metrics every 5s (see prometheus/prometheus.yml).
  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # Prometheus UI and API
    networks:
      - monitoring
    depends_on:
      - app

  # Pre-provisioned datasource and dashboard; login admin/admin.
  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro   # datasource + dashboard loader
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro   # JSON dashboard files
    ports:
      - "3000:3000"   # Grafana UI
    networks:
      - monitoring
    depends_on:
      - prometheus

# Internal DNS: services reach each other by name (e.g. app, prometheus).
networks:
  monitoring:
