groups:
  - name: engineering_slo
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
          / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "5xx rate above 5% for {{ $labels.service }}"

      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Consumer lag high — {{ $labels.group }}"

      - alert: BuildDurationRegression
        expr: ci_pipeline_duration_seconds > 900
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "CI p90 exceeded 15m — investigate cache or test suite"
