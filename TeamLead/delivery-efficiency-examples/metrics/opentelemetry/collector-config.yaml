receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:
  resource:
    attributes:
      - key: deployment.environment
        from_attribute: env
        action: upsert

exporters:
  otlp/datadog:
    endpoint: ${DATADOG_OTLP_ENDPOINT}
  prometheus:
    endpoint: "0.0.0.0:8889"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/datadog]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
