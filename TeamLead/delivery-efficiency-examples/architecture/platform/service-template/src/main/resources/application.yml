spring:
  application:
    name: ${SERVICE_NAME:example-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    console: '{"timestamp":"%d","level":"%p","trace_id":"%X{trace_id}","span_id":"%X{span_id}","msg":"%m"}%n'

otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
