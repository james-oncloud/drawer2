# GitOps — Argo CD Application (progressive delivery via Argo Rollouts in prod)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/org/platform-deploy
    targetRevision: main
    path: environments/staging/payment-service
  destination:
    server: https://kubernetes.default.svc
    namespace: payments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 5
