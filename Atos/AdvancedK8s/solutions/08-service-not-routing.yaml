apiVersion: apps/v1
kind: Deployment
metadata:
  name: routing-lab
  namespace: k8s-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: routing-lab
  template:
    metadata:
      labels:
        app: routing-lab
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: routing-lab
  namespace: k8s-lab
spec:
  selector:
    app: routing-lab
  ports:
    - port: 80
      targetPort: 80
