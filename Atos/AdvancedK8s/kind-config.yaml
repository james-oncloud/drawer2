# Three-node lab cluster: one control-plane, two workers with distinct labels.
# Labels support node-selector, affinity, and taint/toleration exercises.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "lab-zone=east,node-role=general"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "lab-zone=west,disktype=hdd,node-role=general"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "lab-zone=west,disktype=ssd,node-role=general"
