apiVersion: apps/v1
kind: Deployment
metadata:
  name: taint-lab
  namespace: k8s-lab
  labels:
    app: taint-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taint-lab
  template:
    metadata:
      labels:
        app: taint-lab
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
