# Spring Boot demo + PostgreSQL. Liquibase runs migrations on app startup.
# Run: ./shell/fireup.sh  or  docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: liquibase_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5433:5432"   # host access for psql / DBeaver
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d liquibase_demo"]
      interval: 3s
      timeout: 5s
      retries: 10
    networks:
      - liquibase

  app:
    build: ./app
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/liquibase_demo
      SPRING_DATASOURCE_USERNAME: demo
      SPRING_DATASOURCE_PASSWORD: demo
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - liquibase

networks:
  liquibase:

volumes:
  postgres_data:
